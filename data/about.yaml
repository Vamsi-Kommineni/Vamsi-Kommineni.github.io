eyebrow: About
heading: GenAI engineer and researcher
sub: Generative AI, knowledge graphs, computer vision, and medical AI.

# Short bio (markdown allowed: **bold**, *italics*, [links](url)).
bio:
  - >-
    I am a computer-science PhD researcher at the **Heinz Nixdorf Chair for
    Distributed Information Systems** (Friedrich-Schiller-Universität Jena). Most
    recently I was **Founding AI Lead at Nixi AI**, an EXIST-funded medical AI
    startup, where I built the AI engineering stack from the ground up. I work
    across the full path from data to deployment.
  - >-
    My research turns unstructured text and images into structured, reliable
    knowledge, using large language models and retrieval-augmented generation,
    knowledge graph and ontology construction, and computer vision.

